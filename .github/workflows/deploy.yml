name: Deploy to GAS

# mainブランチにPushされた時に自動で動かす設定です
on:
  push:
    branches:
      - main
    paths:
      - "appsscript.json"
      - "main.ts"
      - "api.ts"
      - "auth.ts"
      - "formatters/*.ts"
      - "index.html"
      - "manual_import.ts"
      - "sheets.ts"
      - "types.ts"
      - "const.ts"
      - "tsconfig.json"

jobs:
  deploy:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: 1. コードをチェックアウト（取得）
        uses: actions/checkout@v5

      - name: 2. Node.jsの準備
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: 3. pnpmのインストール
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
          cache: true

      - name: 4. 依存関係のインストール
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: 5. 型チェックの実行
        run: pnpm run typecheck

      - name: 6. ユニットテストの実行
        run: pnpm test

      - name: 7. 認証情報の作成（シークレットから復元）
        run: |
          echo "${{ secrets.CLASPRC_BASE64 }}" | base64 --decode > ~/.clasprc.json

      - name: 8. プロジェクト設定ファイルの作成
        env:
          SCRIPT_ID: ${{ secrets.SCRIPT_ID }}
        run: |
          printf '{"scriptId":"%s","rootDir":"dist"}\n' "$SCRIPT_ID" > .clasp.json

      - name: 9. ビルドおよびClaspでのデプロイ
        run: pnpm run push:prod
