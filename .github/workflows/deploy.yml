name: Deploy to GAS

# mainブランチにPushされた時に自動で動かす設定です
on:
  push:
    branches:
      - main
    paths:
      - 'appsscript.json'
      - 'main.js'
      - 'api.js'
      - 'auth.js'
      - 'formatters/*.js'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. コードをチェックアウト（取得）
        uses: actions/checkout@v5

      - name: 2. Node.jsの準備
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: 3. claspのインストール
        run: npm install -g @google/clasp

      - name: 4. 認証情報の作成（シークレットから復元）
        run: |
          echo "${{ secrets.CLASPRC_BASE64 }}" | base64 --decode > ~/.clasprc.json

      - name: 5. プロジェクト設定ファイルの作成
        env:
          SCRIPT_ID: ${{ secrets.SCRIPT_ID }}
        run: |
          printf '{"scriptId":"%s","rootDir":"."}\n' "$SCRIPT_ID" > .clasp.json

      - name: 6. GASへプッシュ(自動デプロイ)
        run: clasp push -f

